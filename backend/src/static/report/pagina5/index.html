    const cp = {{ climate_projection_record | tojson | safe }};

    // Configuração: [label, icone, prefixo dos campos no Python]
    const indicadores = [
      ["Temperatura média",                             "icone-temp-media",      "temp_med"],
      ["Temperatura mínima",                            "icone-temp-minima",     "temp_min"],
      ["Temperatura máxima",                            "icone-temp-maxima",     "temp_max"],

      ["Intensidade de precipitação",                   "icone-intensidade",     "precip"],
      ["Chuvas extremas",                               "icone-chuvas-extremas", "chuva_ext"],
      ["Nível do mar",                                  "icone-nivel-do-mar",    "nivel_mar"]
    ];

    const rows = [];
    for (const [label, icone, campo] of indicadores) {
      rows.push({
        label: label,
        icon: `./imgs/${icone}.png`,
        presente:   cp[campo]            ?? '—',
        tendencia:  cp[`${campo}_tend`]  ?? '—',
        otimista:   cp[`${campo}_otim`]  ?? '—',
        pessimista: cp[`${campo}_pes`]   ?? '—'
      });
    }

    window.PAGE_DATA.projecao.rows = rows;

    // Mapa do município — usa ./imgs/graficos_temperatura/{geocode}.png se existir;
    // caso contrário, exibe a imagem padrão "sem mapa" via onerror.
    (function () {
      var geocode = "{{ municipal_resilience_profile_record.geocode }}";
      var mapImg = document.getElementById("grafico-temperatura-municipio-img");
      if (!mapImg) return;

      var fallbackSrc = "./imgs/imagem-sem-mapa-do-municipio-v2.png";

      if (!geocode || geocode === "None") {
        mapImg.src = fallbackSrc;
        return;
      }

      mapImg.onerror = function () {
        mapImg.onerror = null;
        mapImg.src = fallbackSrc;
      };
      mapImg.src = "./imgs/graficos_temperatura/" + geocode + ".png";
      console.log("Caminho do mapa definido para geocode " + geocode + ": " + mapImg.src);
