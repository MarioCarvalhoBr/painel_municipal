          <p class="paragraph root-0-paragraph-set-0-paragraph-0" dir="auto"><span class="text-node root-0-paragraph-set-0-paragraph-0-text-0" data-bind="title.linha1">Fichas</span><span class="text-node root-0-paragraph-set-0-paragraph-0-text-1" data-bind="title.linha2"> Municipais</span><span class="text-node root-0-paragraph-set-0-paragraph-0-text-2"> </span></p>

  <!-- rect: Rectangle (caixa do município) -->
  <div class="shape rect rectangle-54ff94c2cd22">
    <!-- text: São José do Vale do Rio Preto - RJ -->
    <div class="shape text fichas-mun-54ffe43fe100">
      <div class="text-node-html" id="html-text-node-437c8563-38ab-80b2-8008-54ffe43fe100" data-x="292.5" data-y="502">
        <div class="root rich-text root-0" xmlns="http://www.w3.org/1999/xhtml">
          <div class="paragraph-set root-0-paragraph-set-0">
            <p class="paragraph root-0-paragraph-set-0-paragraph-0" dir="auto"><span class="text-node root-0-paragraph-set-0-paragraph-0-text-0" data-bind="location.cityState">Curitiba/PR</span></p>

    <script src="./data.js"></script>
    <script src="./shared/js/app.js"></script>
    <script>
      // Imprimir o conteúdo de window.PAGE_DATA que vem de data.js para o console
      console.log('PAGE_DATA (Antes):', window.PAGE_DATA);

      // Injetando dados básicos de localização via Jinja2
      window.PAGE_DATA.location.city = "{{ county_record.county }}";
      window.PAGE_DATA.location.state = "{{ county_record.state }}";

      (function () {
        var geocode = "{{ county_record.geocode }}";
        var mapEl = document.querySelector('[data-bind-bg="figura.image"]');
        if (!mapEl) return;

        var fallbackSrc = window.PAGE_DATA.figura.image || "./imgs/figura-mapa-quadrados-coloridos.png";

        function applyBackground(src) {
          window.PAGE_DATA.figura.image = src;
          mapEl.style.background = 'url("' + src + '") no-repeat center center / cover';
        }

        if (!geocode || geocode === "None") {
          applyBackground(fallbackSrc);
          return;
        }

        var mapSrc = "./imgs/mapas_capa/" + geocode + ".png";
        // background-image não dispara onerror; pré-carrega para poder cair no fallback.
        var probe = new Image();
        probe.onload = function () { applyBackground(mapSrc); };
        probe.onerror = function () { applyBackground(fallbackSrc); };
        probe.src = mapSrc;
        console.log("Caminho do mapa definido para geocode " + geocode + ": " + mapSrc);
      })();

      // Resizes the municipality box to fit the bound location.cityState text,
      // keeping 10px of inner spacing on each side and the box centered on the
      // 842px page. Short names (e.g. "Ypê/MS") get a narrow box; long ones
      // (e.g. "Vila de Santíssima Trindade/MT") get a wider one.
      (function () {
        var PAGE_WIDTH = 842;
        var TEXT_SIDE_SPACING = 10;
        var BORDER_WIDTH = 1; // .rectangle-* border; width includes it (box-sizing: border-box)

        var box = document.querySelector('.rectangle-54ff94c2cd22');
        var textEl = box && box.querySelector('.fichas-mun-54ffe43fe100');
        if (!box || !textEl) return;

        function resizeBoxToText() {
          var textWidth = textEl.getBoundingClientRect().width;
          if (!textWidth) return;
          var boxWidth = Math.ceil(textWidth + 2 * (TEXT_SIDE_SPACING + BORDER_WIDTH));
          box.style.width = boxWidth + 'px';
          box.style.left = ((PAGE_WIDTH - boxWidth) / 2) + 'px';
        }

        function scheduleResize() {
          // Runs after app.js binds the text (its DOMContentLoaded listener was
          // registered first), then again once fonts load, since Roboto changes
          // the measured text width.
          resizeBoxToText();
          if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(resizeBoxToText);
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', scheduleResize);
        } else {
          scheduleResize();
        }
      })();

      </script>
  </body>
