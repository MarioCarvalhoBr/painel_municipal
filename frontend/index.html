<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folha Municipal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="container">
        <h1>Folha Municipal</h1>
        <div class="form-group">
            <label for="county-select">Lista de municípios:</label>
            <select id="county-select">
                <option value="" disabled selected>Carregando municípios...</option>
            </select>
        </div>
        <button id="download-btn" class="btn-danger" disabled>Download</button>
        <button id="download-all-btn" class="btn-primary btn-small">Download All</button>
    </main>

    <!-- Modal de confirmação -->
    <div id="confirmation-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Confirmar Download</h2>
            <p>Você tem certeza que deseja baixar todos os relatórios? Este processo pode levar alguns minutos.</p>
            <div class="modal-buttons">
                <button id="modal-confirm-btn" class="btn-primary">Sim, continuar</button>
                <button id="modal-cancel-btn" class="btn-secondary">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
