<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>AdaptaBrasil — Fase 2 do Plano de Adaptação</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1AA9B1;
      --accent: #E07055;
      --vulnerability: #B3CD27;
      --exposure: #FAC95E;
      --risk: #C8362B;
      --header-bg: #1C3666;
      --on-surface: #1C3666;
      --secondary-text: #899CAC;
      --surface: #FFFFFF;
      --background: #F5F7F6;
      --border: #D2D5D5;
      --soft: #EEF1F1;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--on-surface);
      background: #E8EDEC;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }

    .slide {
      position: relative;
      width: 1200px;
      height: 848px;
      background: var(--surface);
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(28,54,102,0.12);
    }

    /* ---------- Decorações nas bordas ---------- */
    .deco { position: absolute; z-index: 0; pointer-events: none; }
    .deco-tl-1 { top: 60px;  left: -30px; width: 60px;  height: 90px;  background: var(--vulnerability); border-radius: 0 0 60px 60px; transform: rotate(-15deg); opacity: .9; }
    .deco-tl-2 { top: 160px; left: -10px; width: 30px;  height: 60px;  background: var(--primary);       border-radius: 0 30px 30px 0; }
    .deco-bl-1 { bottom: 30px; left: -20px; width: 50px;  height: 80px;  background: var(--primary);     border-radius: 0 60px 60px 0; }
    .deco-tr-1 { top: 0; right: 0; width: 70px; height: 90px; background: var(--vulnerability); border-radius: 0 0 0 70px; opacity: .9; }
    .deco-mr-1 { top: 360px; right: -20px; width: 40px; height: 80px; background: var(--risk); border-radius: 40px 0 0 40px; }
    .deco-mr-2 { top: 460px; right: -10px; width: 30px; height: 60px; background: var(--primary); border-radius: 30px 0 0 30px; }

    /* ---------- Chip município ---------- */
    .chip-municipio {
      position: absolute;
      top: 32px;
      left: 56px;
      z-index: 5;
      padding: 12px 28px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      color: var(--header-bg);
      font-weight: 700;
      font-size: 16px;
      letter-spacing: .04em;
      box-shadow: 0 2px 4px rgba(0,0,0,.04);
    }

    /* ---------- Layout 2 colunas ---------- */
    .grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      padding: 96px 56px 32px;
      height: 100%;
    }
    .col { display: flex; flex-direction: column; gap: 20px; }

    /* ---------- Card base ---------- */
    .card {
      background: var(--soft);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card > .card-header {
      background: var(--header-bg);
      color: #fff;
      padding: 12px 20px;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: .03em;
      text-transform: uppercase;
    }
    .card > .card-body { padding: 16px 20px; }

    /* ---------- Card FASE ---------- */
    .card.fase .card-body { position: relative; padding-right: 140px; min-height: 220px; }
    .card.fase .subtitulo {
      color: var(--accent);
      font-weight: 800;
      font-size: 17px;
      line-height: 1.15;
      margin-bottom: 6px;
    }
    .card.fase .lead {
      font-size: 11.5px;
      color: var(--on-surface);
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .card.fase .pergunta-titulo {
      color: var(--accent);
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .card.fase .descricao {
      font-size: 11.5px;
      line-height: 1.45;
      color: var(--on-surface);
    }
    .card.fase .img-cidade {
      position: absolute;
      top: 8px;
      right: 12px;
      width: 130px;
      height: auto;
    }

    /* ---------- Section LÓGICA ---------- */
    .section-titulo {
      text-align: center;
      background: var(--soft);
      color: var(--header-bg);
      padding: 8px 16px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: .04em;
      border-radius: 8px 8px 0 0;
      text-transform: uppercase;
    }
    .section-body {
      background: #F8F9F9;
      border-radius: 0 0 8px 8px;
      padding: 12px;
    }

    .etapas {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      list-style: none;
      align-items: stretch;
    }
    .etapa {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 6px;
      text-align: center;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .etapa .numero {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 22px;
      height: 22px;
      background: var(--vulnerability);
      color: #fff;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .etapa .nome {
      margin-top: 8px;
      font-size: 10px;
      font-weight: 700;
      color: var(--header-bg);
      letter-spacing: .02em;
      line-height: 1.1;
    }
    .etapa .icone {
      width: 22px;
      height: 22px;
      color: var(--header-bg);
    }
    .etapa .pergunta {
      font-size: 9px;
      color: var(--secondary-text);
      line-height: 1.25;
    }
    .seta {
      position: absolute;
      top: 50%;
      right: -8px;
      transform: translateY(-50%);
      color: var(--vulnerability);
      font-size: 14px;
      font-weight: 700;
      pointer-events: none;
    }
    .etapa:last-child .seta { display: none; }

    /* ---------- Perguntas-chave ---------- */
    .perguntas-chave-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      list-style: none;
    }
    .pergunta-chave {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 6px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .pergunta-chave .icone {
      width: 22px;
      height: 22px;
      color: var(--header-bg);
    }
    .pergunta-chave .texto {
      font-size: 9px;
      color: var(--secondary-text);
      line-height: 1.3;
    }

    /* ---------- Card PRODUTO ---------- */
    .card.produto .card-body { position: relative; padding-right: 140px; }
    .card.produto .img-pessoas {
      position: absolute;
      top: -42px;
      right: 8px;
      width: 130px;
      height: auto;
    }
    .card.produto .subtitulo {
      font-weight: 700;
      font-size: 13px;
      color: var(--header-bg);
      margin-bottom: 6px;
    }
    .card.produto .bullets {
      list-style: none;
      font-size: 12px;
      line-height: 1.6;
      color: var(--on-surface);
      margin-bottom: 14px;
    }
    .card.produto .bullets li::before {
      content: "·";
      margin-right: 6px;
      font-weight: 700;
    }
    .flor-block {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 14px;
      align-items: start;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .flor-block .img-flor { width: 110px; height: auto; }
    .flor-block .explicacao {
      font-size: 10.5px;
      line-height: 1.4;
      color: var(--on-surface);
      margin-bottom: 8px;
    }
    .legendas {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .legendas li {
      font-size: 9.5px;
      color: var(--on-surface);
      display: flex;
      align-items: center;
      gap: 6px;
      line-height: 1.3;
    }
    .legendas li::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legendas li:nth-child(1)::before { background: var(--vulnerability); }
    .legendas li:nth-child(2)::before { background: var(--risk); }

    /* ---------- Card FECHAMENTO ---------- */
    .card.fechamento .card-body { position: relative; padding-right: 80px; }
    .card.fechamento .img-clipboard {
      position: absolute;
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
      width: 56px;
      height: 56px;
      color: var(--header-bg);
    }
    .card.fechamento .subtitulo {
      font-weight: 700;
      font-size: 12.5px;
      color: var(--header-bg);
      margin-bottom: 8px;
    }
    .checklist {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .checklist li {
      font-size: 11.5px;
      color: var(--on-surface);
      display: flex;
      align-items: flex-start;
      gap: 6px;
      line-height: 1.4;
    }
    .checklist li::before {
      content: "✓";
      color: var(--vulnerability);
      font-weight: 800;
      font-size: 13px;
      line-height: 1.1;
    }

    /* ---------- Footer logos ---------- */
    .footer-logos {
      grid-column: 1 / -1;
      margin-top: auto;
      background: var(--soft);
      border-radius: 8px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .footer-logos .logo {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px 6px;
      min-height: 48px;
    }
    .footer-logos .logo img {
      max-width: 100%;
      max-height: 44px;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>

<!-- ============== SVG sprite (ícones) ============== -->

    <symbol id="i-doc" viewBox="0 0 24 24"><path fill="currentColor" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm0 7V3.5L19.5 9H14zM8 13h8v2H8v-2zm0 4h8v2H8v-2z"/></symbol>

    <symbol id="i-chart" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M3 17l5-5 4 4 8-8M14 8h6v6"/></symbol>

<div class="slide" id="slide">
  <span class="deco deco-tl-1"></span>
  <span class="deco deco-tl-2"></span>
  <span class="deco deco-bl-1"></span>
  <span class="deco deco-tr-1"></span>
  <span class="deco deco-mr-1"></span>
  <span class="deco deco-mr-2"></span>

  <div class="chip-municipio">{{ county_record.county }} - {{ county_record.state }}</div>

  <div class="grid">

    <!-- ============ COLUNA ESQUERDA ============ -->
    <div class="col col-left">

      <!-- Card FASE -->
      <section class="card fase">
        <div class="card-header" data-bind="fase.header"></div>
        <div class="card-body">
          <img class="img-cidade" src="ILUSTRAÇÃO CIDADE.png" alt="">
          <h2 class="subtitulo" data-bind="fase.subtitulo"></h2>
          <p class="lead" data-bind="fase.chamada"></p>
          <h3 class="pergunta-titulo" data-bind="fase.perguntaTitulo"></h3>
          <p class="descricao" data-bind="fase.descricao"></p>
        </div>
      </section>

      <!-- Section LÓGICA -->
      <section class="section-logica">
        <div class="section-titulo" data-bind="logica.titulo"></div>
        <div class="section-body">
          <ol class="etapas" data-bind-list="logica.etapas" data-template="etapa"></ol>
        </div>
      </section>

      <!-- Section PERGUNTAS-CHAVE -->
      <section class="section-perguntas">
        <div class="section-titulo" data-bind="perguntasChave.titulo"></div>
        <div class="section-body">
          <ul class="perguntas-chave-grid" data-bind-list="perguntasChave.perguntas" data-template="pergunta-chave"></ul>
        </div>
      </section>

    </div>

    <!-- ============ COLUNA DIREITA ============ -->
    <div class="col col-right">

      <!-- Card PRODUTO -->
      <section class="card produto">
        <div class="card-header" data-bind="produto.titulo"></div>
        <div class="card-body">
          <img class="img-pessoas" src="ILUSTRAÇÃO PESSOAS.png" alt="">
          <h3 class="subtitulo" data-bind="produto.subtitulo"></h3>
          <ul class="bullets" data-bind-list="produto.itens"></ul>
          <div class="flor-block">
            <img class="img-flor" src="Flor de Risco.png" alt="">
            <div>
              <p class="explicacao" data-bind="produto.explicacaoFlor"></p>
              <ul class="legendas" data-bind-list="produto.legendas"></ul>
            </div>
          </div>
        </div>
      </section>

      <!-- Card FECHAMENTO -->
      <section class="card fechamento">
        <div class="card-header" data-bind="fechamento.titulo"></div>
        <div class="card-body">
          <svg class="img-clipboard"><use href="#i-clipboard"/></svg>
          <h3 class="subtitulo" data-bind="fechamento.subtitulo"></h3>
          <ul class="checklist" data-bind-list="fechamento.perguntas"></ul>
        </div>
      </section>

      <!-- Footer logos -->
      <div class="footer-logos" data-bind-list="rodape.logos" data-template="logo-placeholder"></div>

    </div>

  </div>
</div>

<!-- ============ Templates ============ -->
<template id="tpl-etapa">
  <li class="etapa">
    <span class="numero" data-bind="numero"></span>
    <span class="nome" data-bind="nome"></span>
    <svg class="icone"><use href="#i-doc"/></svg>
    <span class="pergunta" data-bind="pergunta"></span>
    <span class="seta">›</span>
  </li>
</template>

<template id="tpl-pergunta-chave">
  <li class="pergunta-chave">
    <svg class="icone"><use href="#i-globe"/></svg>
    <span class="texto"></span>
  </li>
</template>

<template id="tpl-logo-placeholder">
  <div class="logo"><img alt=""></div>
</template>

<script>
  // Mapas para variar ícones por posição (sem precisar de ícone no JSON)
  const ICONES_ETAPAS = ['i-doc', 'i-bars', 'i-chart', 'i-thermo', 'i-list'];
  const ICONES_PERGUNTAS = ['i-globe', 'i-alert', 'i-cloud', 'i-people', 'i-target'];

  function get(obj, path) {
    return path.split('.').reduce((o, k) => (o == null ? undefined : o[k]), obj);
  }

  // 1) Bind simples por path
  document.querySelectorAll('[data-bind]').forEach(el => {
    if (el.closest('template')) return;
    const v = get(data, el.dataset.bind);
    if (v != null) el.textContent = v;
  });

  // 2) Bind de listas (clona <template> ou cria <li> simples)
  document.querySelectorAll('[data-bind-list]').forEach(host => {
    const items = get(data, host.dataset.bindList) || [];
    const tplId = host.dataset.template;
    const tpl = tplId ? document.getElementById('tpl-' + tplId) : null;

    items.forEach((item, idx) => {
      if (tpl) {
        const node = tpl.content.cloneNode(true);
        node.querySelectorAll('[data-bind]').forEach(c => {
          const v = typeof item === 'object' ? get(item, c.dataset.bind) : item;
          if (v != null) c.textContent = v;
        });

        // Texto solto (li.pergunta-chave .texto, .logo legado em string)
        const textoEl = node.querySelector('.texto');
        if (textoEl && typeof item === 'string') textoEl.textContent = item;
        const logoEl = node.querySelector('.logo');
        if (logoEl && typeof item === 'string') logoEl.textContent = item;

        // Logo como imagem ({src, alt})
        const logoImg = node.querySelector('.logo img');
        if (logoImg && typeof item === 'object' && item.src) {
          logoImg.src = item.src;
          logoImg.alt = item.alt || '';
        }

        // Trocar ícone por posição
        const useEl = node.querySelector('use');
        if (useEl) {
          if (tplId === 'etapa')         useEl.setAttribute('href', '#' + ICONES_ETAPAS[idx % ICONES_ETAPAS.length]);
          if (tplId === 'pergunta-chave') useEl.setAttribute('href', '#' + ICONES_PERGUNTAS[idx % ICONES_PERGUNTAS.length]);
        }

        host.appendChild(node);
      } else {
        const li = document.createElement('li');
        li.textContent = item;
        host.appendChild(li);
      }
    });
  });
</script>

</body>
</html>
