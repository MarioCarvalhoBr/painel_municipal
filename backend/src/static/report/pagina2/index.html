     <script>
      // Imprimir o conteúdo de window.PAGE_DATA que vem de data.js para o console
      console.log('PAGE_DATA (Antes):', window.PAGE_DATA);

      // Injetando dados básicos de localização via Jinja2
      window.PAGE_DATA.location.city = "{{ county_record.county }}";
      window.PAGE_DATA.location.state = "{{ county_record.state }}";

      // 1. Receber o dicionário do Jinja2 de forma segura (converte Python dict para JS Array)
      const dynamicRisks = {{ risks_record | tojson | safe }};

      // 2. Mapear o formato do banco para o formato esperado pelo layout (rows)
      window.PAGE_DATA.rows = dynamicRisks.map(function(item) {
        return {
          sector: item.sep,
          name: item.risk,
          
          // O antigo usava texto ("Muito alto"), agora você tem o valor numérico e a cor. 
          // Se o seu HTML continuar esperando um texto, você pode precisar de uma função extra aqui, 
          // mas repassando o valor puro fica assim:
          tempoAtual: item.formatted_current_value, 
          tempoAtualColor: item.current_value_color, // Adicionado caso precise pintar a bolinha no HTML

          futuro2050: item.formatted_future_value,
          futuro2050Color: item.future_color, // Adicionado caso precise pintar a bolinha no HTML
          
          // Mapeando os indicadores e lidando com campos vazios ('') do banco.
          // *Color: cor de fundo de cada célula, vinda do banco via Jinja2.
          ameaca: item['Ameaça'] !== '' ? item['Ameaça'] : '-',
          ameacaColor: item['Ameaça_color'],
          exposicao: item['Exposição'] !== '' ? item['Exposição'] : '-',
          exposicaoColor: item['Exposição_color'],
          vulnerabilidade: item['Vulnerabilidade'] !== '' ? item['Vulnerabilidade'] : '-',
          vulnerabilidadeColor: item['Vulnerabilidade_color'],

          sensibilidade: item['Sensibilidade'] !== '' ? item['Sensibilidade'] : '-',
          sensibilidadeColor: item['Sensibilidade_color'],
          
          capacidadeAdaptativa: item['Capacidade adaptativa'] !== '' ? item['Capacidade adaptativa'] : '-',
          capacidadeAdaptativaColor: item['Capacidade adaptativa_color'],
          
          // Extra: Passando a imagem também, caso o frontend queira renderizar dinamicamente
          iconUrl: item.imageurl,
          riskUrl: item.risk_url
        };
      });

      console.log('PAGE_DATA (Depois da injeção):', window.PAGE_DATA);
    </script>

  </body>
