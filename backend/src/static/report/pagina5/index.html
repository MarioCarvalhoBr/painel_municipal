  <!-- group: projecao clima (refatorado: SVG do Penpot -> tabela HTML com variaveis) -->
  <div class="projecao-clima">
    <div class="projecao-title" data-bind="projecao.title">projeção clima</div>
    <table class="projecao">
      <colgroup>
        <col class="c-ind">
        <col class="c-pre">
        <col class="c-ten">
        <col class="c-oti">
        <col class="c-pes">
      </colgroup>

        <tr>
          <th class="col-ind" rowspan="2" data-bind="projecao.columns.indicador">Indicador anual</th>
          <th rowspan="2" data-bind="projecao.columns.presente">presente</th>
          <th rowspan="2" data-bind="projecao.columns.tendencia">tendência observada</th>
          <th class="col-fut" colspan="2" data-bind="projecao.columns.futuro">Cenário Futuro (2050)</th>
        </tr>
        <tr>
          <th data-bind="projecao.columns.otimista">otimista</th>
          <th data-bind="projecao.columns.pessimista">pessimista</th>
        </tr>

    </table>
    <template id="projecao-row-tpl">
      <tr>
        <td class="col-ind"><img class="row-ico" data-field="icon" alt=""><span data-field="label"></span></td>
        <td data-field="presente"></td>
        <td data-field="tendencia"></td>

    <script src="./data.js"></script>
    <script src="./shared/js/app.js"></script>
    <script>
      // Imprimir o conteúdo de window.PAGE_DATA que vem de data.js para o console
      console.log('PAGE_DATA (Antes):', window.PAGE_DATA);

      // Injetando dados básicos de localização via Jinja2
      window.PAGE_DATA.location.city = "{{ county_record.county }}";
      window.PAGE_DATA.location.state = "{{ county_record.state }}";
      const cityStateData = window.PAGE_DATA.location.city + "/" + window.PAGE_DATA.location.state;

      const cityStateEl = document.querySelector('[data-bind="location.cityState"]');
      const curitibaEl = document.querySelector('.curitiba-676df7a77bca');

      if (cityStateEl) {
        cityStateEl.style.fontSize = cityStateData.length > 15 ? '9.5px' : '14px';  
        if (curitibaEl) {
          curitibaEl.style.top = '10px';
          curitibaEl.style.left = '5px';
          curitibaEl.style.width = '100%';
        }
        if (cityStateEl.style.fontSize === '14px') {
          
        } 
      }
      
      
      const cp = {{ climate_projection_record | tojson | safe }};

      // Configuração: [label, icone, prefixo dos campos no Python]
      const indicadores = [
        ["Temperatura média",                             "icone-temp-media",      "temp_med"],
        ["Temperatura mínima",                            "icone-temp-minima",     "temp_min"],
        ["Temperatura máxima",                            "icone-temp-maxima",     "temp_max"],
        ["Números máximo de dias secos consecutivos",     "icone-dias-secos",      "dias_secos"],
        ["Números máximo de dias de chuva consecutivos",  "icone-dias-chuva",      "dias_chuva"],
        ["Intensidade de precipitação",                   "icone-intensidade",     "precip"],
        ["Chuvas extremas",                               "icone-chuvas-extremas", "chuva_ext"],
        ["Nível do mar",                                  "icone-nivel-do-mar",    "nivel_mar"]
      ];

      const rows = [];
      for (const [label, icone, campo] of indicadores) {
        rows.push({
          label: label,
          icon: `./imgs/${icone}.png`,
          presente:   cp[campo]            ?? '—',
          tendencia:  cp[`${campo}_tend`]  ?? '—',
          otimista:   cp[`${campo}_otim`]  ?? '—',
          pessimista: cp[`${campo}_pes`]   ?? '—'
        });
      }

      window.PAGE_DATA.projecao.rows = rows;

      // Mapa do município — usa ./imgs/graficos_temperatura/{geocode}.png se existir;
      // caso contrário, exibe a imagem padrão "sem mapa" via onerror.
      (function () {
        var geocode = "{{ municipal_resilience_profile_record.geocode }}";
        var mapImg = document.getElementById("grafico-temperatura-municipio-img");
        if (!mapImg) return;

        var fallbackSrc = "./imgs/imagem-sem-mapa-do-municipio-v2.png";

        if (!geocode || geocode === "None") {
          mapImg.src = fallbackSrc;
          return;
        }

        mapImg.onerror = function () {
          mapImg.onerror = null;
          mapImg.src = fallbackSrc;
        };
        mapImg.src = "./imgs/graficos_temperatura/" + geocode + ".svg";
        console.log("Caminho do mapa definido para geocode " + geocode + ": " + mapImg.src);
      })();

      // Mapa do município — usa ./imgs/mapas_temperatura/{geocode}.png se existir;
      // caso contrário, exibe a imagem padrão "sem mapa" via onerror.
      (function () {
        var geocode = "{{ municipal_resilience_profile_record.geocode }}";
        var mapImg = document.getElementById("mapa-temperatura-municipio-img");
        if (!mapImg) return;

        var fallbackSrc = "./imgs/imagem-sem-mapa-do-municipio-v2.png";

        if (!geocode || geocode === "None") {
          mapImg.src = fallbackSrc;
          return;
        }

        mapImg.onerror = function () {
          mapImg.onerror = null;
          mapImg.src = fallbackSrc;
        };
        mapImg.src = "./imgs/mapas_temperatura/" + geocode + "_lr.png";
        console.log("Caminho do mapa definido para geocode " + geocode + ": " + mapImg.src);
      })();
      

      console.log('PAGE_DATA (Depois):', window.PAGE_DATA);

    
    </script>
